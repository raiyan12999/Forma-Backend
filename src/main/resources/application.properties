# ============================================================
# FORMA Studio - Application Configuration
# ============================================================

# ----- Server -----
server.port=8080

# ----- Database -----
# Replace these values with your actual MySQL credentials before running
spring.datasource.url=jdbc:mysql://localhost:3306/forma_studio?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- JPA / Hibernate -----
# "update" means Hibernate will create/alter tables automatically based on your entities.
# Switch to "validate" in production once tables are stable.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ----- File Upload -----
# Allow uploads up to 20MB (raw file - after resizing, saved files are much smaller)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ----- Image Storage -----
# Where to save uploaded images on disk.
# All three resized versions (large/medium/thumb) go into subfolders here.
# Change this to an absolute path like /var/www/forma/uploads on a server.
app.upload.dir=./uploads

# Base URL used to build image URLs returned by the API.
# In production, change this to your actual domain: https://formastudio.com
app.base-url=http://localhost:8080

# ----- Admin Credentials -----
# Simple hardcoded admin login. Replace with a strong password before going live.
# Later you can move this to a database-backed user system.
app.admin.username=admin
app.admin.password=forma2025!

# ----- CORS -----
# Allowed origins for browser requests during local development.
# Add your production domain here when you deploy.
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://127.0.0.1:5501/,http://127.0.0.1:5502/

# ----- Logging -----
logging.level.com.forma=INFO
logging.level.org.springframework.security=WARN
